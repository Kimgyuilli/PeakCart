apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-api-jvm
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  api-jvm-dashboard.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "API Response Time (p95)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{application=\"peekcart\", uri!~\"/actuator.*\"}[5m])) by (le, uri))",
              "legendFormat": "p95 {{uri}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.1 },
                  { "color": "red", "value": 2 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "title": "API Response Time (p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket{application=\"peekcart\", uri!~\"/actuator.*\"}[5m])) by (le, uri))",
              "legendFormat": "p99 {{uri}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s" },
            "overrides": []
          }
        },
        {
          "title": "Error Rate (5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{application=\"peekcart\", status=~\"5..\"}[5m])) / sum(rate(http_server_requests_seconds_count{application=\"peekcart\"}[5m])) * 100",
              "legendFormat": "5xx error rate %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 5 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "title": "Request Rate (RPS)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{application=\"peekcart\", uri!~\"/actuator.*\"}[5m])) by (uri)",
              "legendFormat": "{{uri}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps" },
            "overrides": []
          }
        },
        {
          "title": "JVM Heap Memory",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "jvm_memory_used_bytes{application=\"peekcart\", area=\"heap\"}",
              "legendFormat": "Used ({{id}})"
            },
            {
              "expr": "jvm_memory_max_bytes{application=\"peekcart\", area=\"heap\"}",
              "legendFormat": "Max ({{id}})"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes" },
            "overrides": []
          }
        },
        {
          "title": "JVM GC Pause",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "rate(jvm_gc_pause_seconds_sum{application=\"peekcart\"}[5m])",
              "legendFormat": "{{action}} ({{cause}})"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s" },
            "overrides": []
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["peekcart", "api", "jvm"],
      "templating": { "list": [] },
      "time": { "from": "now-30m", "to": "now" },
      "title": "PeekCart — API & JVM",
      "uid": "peekcart-api-jvm"
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-kafka-lag
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  kafka-lag-dashboard.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Kafka Consumer Lag (Max)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "kafka_consumer_fetch_manager_records_lag_max{application=\"peekcart\"}",
              "legendFormat": "{{kafka_consumer_group_id}} — {{topic}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "red", "value": 100 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "title": "Records Consumed Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "rate(kafka_consumer_fetch_manager_records_consumed_total{application=\"peekcart\"}[5m])",
              "legendFormat": "{{kafka_consumer_group_id}} — {{topic}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "ops" },
            "overrides": []
          }
        },
        {
          "title": "Consumer Fetch Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "rate(kafka_consumer_fetch_manager_fetch_total{application=\"peekcart\"}[5m])",
              "legendFormat": "{{kafka_consumer_group_id}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "ops" },
            "overrides": []
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["peekcart", "kafka"],
      "templating": { "list": [] },
      "time": { "from": "now-30m", "to": "now" },
      "title": "PeekCart — Kafka Consumer Lag",
      "uid": "peekcart-kafka-lag"
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-pod-resources
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  pod-resources-dashboard.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Pod CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"peekcart\", container!=\"\", container!=\"POD\"}[5m])",
              "legendFormat": "{{pod}} / {{container}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percentunit" },
            "overrides": []
          }
        },
        {
          "title": "Pod Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"peekcart\", container!=\"\", container!=\"POD\"}",
              "legendFormat": "{{pod}} / {{container}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes" },
            "overrides": []
          }
        },
        {
          "title": "Pod Restarts",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "kube_pod_container_status_restarts_total{namespace=\"peekcart\"}",
              "legendFormat": "{{pod}} / {{container}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          }
        },
        {
          "title": "HPA Current Replicas",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"peekcart\"}",
              "legendFormat": "{{horizontalpodautoscaler}}"
            },
            {
              "expr": "kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"peekcart\"}",
              "legendFormat": "desired — {{horizontalpodautoscaler}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["peekcart", "kubernetes"],
      "templating": { "list": [] },
      "time": { "from": "now-30m", "to": "now" },
      "title": "PeekCart — Pod Resources & HPA",
      "uid": "peekcart-pod-resources"
    }
