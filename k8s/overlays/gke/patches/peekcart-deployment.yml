# GKE: e2-standard-4 (4 vCPU / 16Gi) 기준 resources 상향
# - HPA max=3 기준 requests 합계: 3 × (500m / 1Gi) = 1.5 vCPU / 3Gi → 노드 allocatable 여유 확보
# - limits 는 vCPU 오버커밋 허용 (K8s 정책). memory limit 은 pod OOMKill 방어선
# - imagePullPolicy 는 base 기본값(IfNotPresent) 사용. Artifact Registry pull 허용
- op: replace
  path: /spec/template/spec/containers/0/resources
  value:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
