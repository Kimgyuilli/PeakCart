# GKE: Internal LoadBalancer 로 노출 (VPC 내부에서만 접근)
# - 부하 발생기 VM 을 같은 VPC/zone 에 두어 네트워크 병목 제거 (ADR-0004)
# - 외부 공개가 필요하면 Ingress + IAP 로 별도 구성. 본 overlay 는 Internal 고정
# - strategic merge: annotations 는 key 단위 병합되므로 base 에 다른 annotation 이 추가되어도
#   덮어쓰지 않음 (과거 JSON6902 `op: add /metadata/annotations` 방식은 객체 전체 치환 위험)
apiVersion: v1
kind: Service
metadata:
  name: peekcart
  namespace: peekcart
  annotations:
    networking.gke.io/load-balancer-type: "Internal"
spec:
  type: LoadBalancer
