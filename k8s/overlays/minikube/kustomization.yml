apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# minikube overlay — 로컬 개발/검증 환경 (ADR-0003 / ADR-0005)
# - 이미지: 로컬 빌드 사용 (imagePullPolicy: Never)
# - 외부 노출: NodePort 30080

resources:
  - ../../base

patches:
  - path: patches/peekcart-deployment.yml
    target:
      kind: Deployment
      name: peekcart
  - path: patches/peekcart-service.yml
    target:
      kind: Service
      name: peekcart
