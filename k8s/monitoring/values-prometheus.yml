# kube-prometheus-stack Helm values — minikube 경량 설정
# minikube 8GB 환경: 모니터링 총 ~1.2GB 이내

prometheus:
  prometheusSpec:
    retention: 6h
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    serviceMonitorNamespaceSelector:
      matchNames:
        - peekcart
    serviceMonitorSelector: {}
    podMonitorSelector: {}
    storageSpec: {}

grafana:
  adminPassword: admin
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
    alerts:
      enabled: true
      searchNamespace: ALL
  service:
    type: NodePort
    nodePort: 30030
  additionalDataSources:
    - name: prometheus
      type: prometheus
      uid: prometheus
      url: http://kube-prometheus-stack-prometheus.monitoring:9090
      access: proxy
      isDefault: true
  grafana.ini:
    unified_alerting:
      enabled: true

alertmanager:
  enabled: false

prometheus-node-exporter:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
