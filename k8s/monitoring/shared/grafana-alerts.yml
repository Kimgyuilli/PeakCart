apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting-rules
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  alerts.yaml: |-
    apiVersion: 1
    groups:
      - orgId: 1
        name: PeekCart Alerts
        folder: PeekCart
        interval: 1m
        rules:
          - uid: peekcart-high-error-rate
            title: "High Error Rate (5xx > 5%)"
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "sum(rate(http_server_requests_seconds_count{application=\"peekcart\", status=~\"5..\"}[5m]))"
                  instant: false
                  range: true
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "sum(rate(http_server_requests_seconds_count{application=\"peekcart\"}[5m]))"
                  instant: false
                  range: true
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: math
                  expression: "($B > 0) && (($A / $B) * 100 > 5)"
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "PeekCart 5xx 에러율 5% 초과"
              description: "최근 5분간 5xx 에러율이 5%를 초과했습니다."
          - uid: peekcart-slow-response
            title: "Slow API Response (p95 > 2s)"
            condition: B
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{application=\"peekcart\", uri!~\"/actuator.*\"}[5m])) by (le))"
                  instant: false
                  range: true
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator:
                        type: gt
                        params: [2]
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "PeekCart API p95 응답시간 2초 초과"
              description: "최근 5분간 API p95 응답시간이 2초를 초과했습니다."
          - uid: peekcart-target-down
            title: "Peekcart Target Down (up == 0)"
            condition: B
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "max(up{namespace=\"peekcart\", service=\"peekcart\"} == 0)"
                  instant: false
                  range: true
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: math
                  expression: "$A > 0"
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "PeekCart 타겟 스크랩 실패 (up == 0)"
              description: "Prometheus 가 peekcart 엔드포인트를 스크랩 시도했으나 실패 (네트워크, 인증, /actuator/prometheus 500 등). up 시계열은 존재하되 0. Error Rate 패널의 강제 0% 표시와 구분하는 신호."
          - uid: peekcart-scrape-absent
            title: "Peekcart Metrics Scrape Absent"
            condition: B
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "absent(up{namespace=\"peekcart\", service=\"peekcart\"})"
                  instant: false
                  range: true
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: math
                  expression: "$A > 0"
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "PeekCart up 시계열 부재 (ServiceMonitor 미매칭 / 네임스페이스·서비스 삭제)"
              description: "up 메트릭 series 자체가 존재하지 않음. ServiceMonitor selector 미스매치, 네임스페이스·서비스 삭제, Prometheus 설정 문제 등 구조적 부재를 의미. 스크랩 실패(up == 0) 는 `peekcart-target-down` 에서 별도 감지."
